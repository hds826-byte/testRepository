<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>게시판 — 인사동 AI 학습동아리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/shared.css"/>
  <style>
  .main{margin-left:var(--sb)}
  .page-hero{padding:56px 56px 40px;border-bottom:1px solid var(--border)}
  .board-wrap{padding:40px 56px 60px;display:grid;grid-template-columns:1fr 340px;gap:28px;align-items:start}
  /* Write form */
  .write-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);padding:24px;margin-bottom:24px}
  .write-box.locked{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:18px 24px}
  .write-box.locked p{font-size:13px;color:var(--muted)}
  .w-row{display:flex;gap:10px;margin-bottom:10px}
  .w-sel{background:var(--bg3);border:1px solid var(--bord2);border-radius:var(--r);color:var(--txt);padding:10px 14px;font-size:13px;outline:none;transition:.15s;flex-shrink:0}
  .w-sel:focus{border-color:var(--accent)}
  .w-inp{flex:1;background:var(--bg3);border:1px solid var(--bord2);border-radius:var(--r);color:var(--txt);padding:10px 14px;font-size:13px;outline:none;transition:.15s}
  .w-inp:focus,.w-inp:hover{border-color:var(--accent)}
  .w-ta{width:100%;background:var(--bg3);border:1px solid var(--bord2);border-radius:var(--r);color:var(--txt);padding:10px 14px;font-size:14px;resize:vertical;line-height:1.6;outline:none;transition:.15s;margin-bottom:10px}
  .w-ta:focus{border-color:var(--accent)}
  .w-foot{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .file-lbl{cursor:pointer}
  .file-btn{padding:8px 14px;border-radius:var(--r);border:1px dashed var(--bord2);color:var(--muted);font-size:12px;transition:.15s;display:inline-block;font-family:var(--font)}
  .file-btn:hover{border-color:var(--accent);color:var(--accent)}
  .file-chips{display:flex;flex-wrap:wrap;gap:5px;flex:1}
  .file-chip{font-size:11px;padding:3px 9px;border-radius:4px;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.2);color:var(--accent);display:inline-flex;align-items:center;gap:5px}
  .file-chip button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:11px;line-height:1;padding:0}
  /* Toolbar */
  .board-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
  .cats{display:flex;flex-wrap:wrap;gap:6px}
  .cat-btn{padding:6px 13px;border-radius:var(--r);border:1px solid var(--bord2);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:.15s}
  .cat-btn:hover{color:var(--txt)}
  .cat-btn.active{background:rgba(56,189,248,.1);border-color:var(--accent);color:var(--accent)}
  .board-search{background:var(--bg3);border:1px solid var(--bord2);border-radius:var(--r);color:var(--txt);padding:9px 14px;font-size:13px;outline:none;transition:.15s;width:180px}
  .board-search:focus{border-color:var(--accent)}
  /* Post list */
  .post-list{display:flex;flex-direction:column;gap:10px}
  .post-item{background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;cursor:pointer;transition:.15s}
  .post-item:hover{border-color:var(--bord2)}
  .pi-hd{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .pi-cat{font-size:10px;padding:2px 9px;border-radius:4px;background:rgba(129,140,248,.1);color:var(--acc2);border:1px solid rgba(129,140,248,.2);flex-shrink:0}
  .pi-title{font-size:15px;font-weight:600;flex:1}
  .pi-prev{font-size:13px;color:var(--muted);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .pi-ft{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--dim);flex-wrap:wrap;gap:6px}
  .pi-ft-left{display:flex;align-items:center;gap:10px}
  .like-btn{background:none;border:1px solid var(--border);color:var(--dim);border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;transition:.15s}
  .like-btn:hover,.like-btn.liked{border-color:var(--red);color:var(--red)}
  /* Paging */
  .paging{display:flex;justify-content:center;gap:6px;margin-top:20px}
  .pg-btn{width:32px;height:32px;border-radius:var(--r);border:1px solid var(--bord2);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;transition:.15s}
  .pg-btn:hover,.pg-btn.active{background:rgba(56,189,248,.1);border-color:var(--accent);color:var(--accent)}
  /* Sidebar info */
  .info-box{background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:16px}
  .info-box h4{font-size:14px;font-weight:600;margin-bottom:12px}
  .info-row{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px solid var(--border)}
  .info-row:last-child{border:none}
  .info-val{font-family:var(--mono);font-size:12px;color:var(--accent)}
  /* Post detail modal */
  .pd-meta{font-size:12px;color:var(--muted);font-family:var(--mono);margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap}
  .pd-body{font-size:14px;line-height:1.8;white-space:pre-wrap;min-height:80px}
  .pd-files{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
  .pd-files h4{font-size:12px;color:var(--muted);margin-bottom:8px}
  .pd-file{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--accent);border:1px solid rgba(56,189,248,.2);background:rgba(56,189,248,.06);padding:4px 12px;border-radius:4px;margin:3px;cursor:pointer}
  @media(max-width:1024px){.board-wrap{grid-template-columns:1fr}.board-side{display:grid;grid-template-columns:1fr 1fr;gap:16px}}
  @media(max-width:768px){
    .page-hero{padding:70px 18px 28px}
    .board-wrap{padding:24px 18px 48px}
    .w-row{flex-direction:column}
    .board-search{width:100%}
  }
  </style>
</head>
<body>
<script src="../js/sidebar.js"></script>

<main class="main">
  <div class="page-hero">
    <span class="sec-lbl">BOARD</span>
    <h1 style="font-size:28px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px">자유 게시판</h1>
    <p style="font-size:13px;color:var(--muted)">아이디어 · AI 툴 추천 · 공모전 제안 · 모임 후기 — 무엇이든 OK</p>
  </div>

  <div class="board-wrap">
    <div class="board-main">
      <!-- Write -->
      <div id="writeArea"></div>

      <!-- Toolbar -->
      <div class="board-toolbar">
        <div class="cats">
          <button class="cat-btn active" onclick="filterCat('전체',this)">전체</button>
          <button class="cat-btn" onclick="filterCat('일반',this)">💬 일반</button>
          <button class="cat-btn" onclick="filterCat('아이디어',this)">💡 아이디어</button>
          <button class="cat-btn" onclick="filterCat('공모전',this)">🏆 공모전</button>
          <button class="cat-btn" onclick="filterCat('AI툴',this)">🤖 AI 툴</button>
          <button class="cat-btn" onclick="filterCat('모임',this)">📅 모임</button>
        </div>
        <input class="board-search" placeholder="검색..." oninput="searchPosts(this.value)"/>
      </div>

      <div id="postList" class="post-list"></div>
      <div id="paging" class="paging"></div>
    </div>

    <div class="board-side">
      <div class="info-box">
        <h4>📊 게시판 현황</h4>
        <div id="boardStats"></div>
      </div>
      <div class="info-box">
        <h4>🏷 인기 태그</h4>
        <div id="popularTags" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px"></div>
      </div>
    </div>
  </div>
</main>

<!-- Post detail -->
<div id="postModal" class="modal-ov" onclick="closeOuter(event,'postModal')">
  <div class="modal-box wide">
    <div class="modal-hd">
      <h3 id="pmTitle"></h3>
      <button class="modal-close" onclick="closeModal('postModal')">✕</button>
    </div>
    <div id="pmBody" class="modal-body" style="gap:0"></div>
  </div>
</div>

<script src="../js/shared.js"></script>
<script>
let _cat='전체',_q='',_page=1,_attached=[];
const PG=8;

/* ── Write area ── */
function renderWrite(){
  const s=DB.session();
  const el=document.getElementById('writeArea');
  if(!s){
    el.innerHTML=`<div class="write-box locked">
      <p>✦ 게시글 작성은 로그인 후 이용 가능합니다.</p>
      <button class="btn btn-accent btn-sm" onclick="openModal('loginModal')">로그인하기</button>
    </div>`;
    return;
  }
  el.innerHTML=`<div class="write-box">
    <div class="w-row">
      <select id="wCat" class="w-sel">
        <option>일반</option><option>아이디어</option><option>공모전</option><option>AI툴</option><option>모임</option>
      </select>
      <input id="wTitle" class="w-inp" placeholder="제목을 입력하세요"/>
    </div>
    <textarea id="wBody" class="w-ta" rows="4" placeholder="내용을 자유롭게 작성해 주세요..."></textarea>
    <div class="w-foot">
      <label class="file-lbl">
        <input type="file" id="wFile" multiple accept=".pdf,.docx,.xlsx,.pptx,.jpg,.jpeg,.png,.gif,.zip,.txt" style="display:none" onchange="attachFiles()"/>
        <span class="file-btn">📎 파일 첨부 (최대 5MB)</span>
      </label>
      <div id="wChips" class="file-chips"></div>
      <button class="btn btn-accent" style="margin-left:auto" onclick="submitPost()">게시하기 →</button>
    </div>
  </div>`;
}

function attachFiles(){
  const files=document.getElementById('wFile').files;
  Array.from(files).forEach(f=>{
    if(f.size>5*1024*1024){toast(`${f.name}: 5MB 초과`,`err`);return}
    const r=new FileReader();
    r.onload=e=>{_attached.push({name:f.name,size:f.size,data:e.target.result});renderChips()};
    r.readAsDataURL(f);
  });
}
function renderChips(){
  const el=document.getElementById('wChips');if(!el)return;
  el.innerHTML=_attached.map((f,i)=>`<span class="file-chip">📎 ${esc(f.name)} <button onclick="removeFile(${i})">✕</button></span>`).join('');
}
function removeFile(i){_attached.splice(i,1);renderChips()}

function submitPost(){
  const s=DB.session();if(!s){toast('로그인 후 이용해 주세요.','err');return}
  const cat=document.getElementById('wCat').value;
  const title=document.getElementById('wTitle').value.trim();
  const body=document.getElementById('wBody').value.trim();
  if(!title){toast('제목을 입력해 주세요.','err');return}
  if(body.length<5){toast('내용을 5자 이상 입력해 주세요.','err');return}
  DB.addPost({cat,title,body,author:s.name,authorId:s.id,dept:s.dept,files:[..._attached]});
  document.getElementById('wTitle').value='';
  document.getElementById('wBody').value='';
  document.getElementById('wFile').value='';
  _attached=[];renderChips();
  _cat='전체';_page=1;
  document.querySelectorAll('.cat-btn').forEach((b,i)=>{b.classList.toggle('active',i===0)});
  renderPosts();renderStats();
  toast('게시글이 등록됐습니다!');
}

/* ── Filter / Search ── */
function filterCat(c,btn){_cat=c;_page=1;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderPosts()}
function searchPosts(q){_q=q.trim();_page=1;renderPosts()}

/* ── Render posts ── */
function renderPosts(){
  const s=DB.session();
  let posts=DB.posts();
  if(_cat!=='전체')posts=posts.filter(p=>p.cat===_cat);
  if(_q)posts=posts.filter(p=>p.title.includes(_q)||p.body.includes(_q)||p.author.includes(_q));
  const total=posts.length;
  const paged=posts.slice((_page-1)*PG,_page*PG);
  const el=document.getElementById('postList');
  if(!paged.length){el.innerHTML='<div class="loading">게시글이 없습니다</div>';document.getElementById('paging').innerHTML='';return}
  el.innerHTML=paged.map(p=>{
    const liked=s&&p.likedBy&&p.likedBy.includes(s.id);
    return `<div class="post-item" onclick="openPost(${p.id})">
      <div class="pi-hd"><span class="pi-cat">${esc(p.cat)}</span><span class="pi-title">${esc(p.title)}</span></div>
      <div class="pi-prev">${esc(p.body)}</div>
      <div class="pi-ft">
        <div class="pi-ft-left">
          <button class="like-btn ${liked?'liked':''}" onclick="event.stopPropagation();toggleLike(${p.id})">♥ ${p.likes||0}</button>
          ${p.files&&p.files.length?`<span>📎 ${p.files.length}개</span>`:''}
        </div>
        <span>${esc(p.author)} · ${esc(p.dept||'')} · ${fmtDate(p.createdAt)}</span>
      </div>
    </div>`;
  }).join('');
  const tp=Math.ceil(total/PG);
  const pg=document.getElementById('paging');
  pg.innerHTML=tp>1?Array.from({length:tp},(_,i)=>`<button class="pg-btn ${i+1===_page?'active':''}" onclick="goPage(${i+1})">${i+1}</button>`).join(''):'';
}
function goPage(n){_page=n;renderPosts();document.getElementById('writeArea').scrollIntoView({behavior:'smooth'})}
function toggleLike(id){const s=DB.session();if(!s){toast('로그인 후 이용해 주세요.','err');return}DB.likePost(id,s.id);renderPosts()}

/* ── Stats ── */
function renderStats(){
  const posts=DB.posts();
  const cats={};posts.forEach(p=>{cats[p.cat]=(cats[p.cat]||0)+1});
  document.getElementById('boardStats').innerHTML=
    `<div class="info-row"><span>전체 게시글</span><span class="info-val">${posts.length}</span></div>`+
    Object.entries(cats).map(([c,n])=>`<div class="info-row"><span>${c}</span><span class="info-val">${n}</span></div>`).join('');
  const tags=['ChatGPT','Claude','공모전','자동화','프롬프트','데이터분석','사회서비스','아이디어'];
  document.getElementById('popularTags').innerHTML=tags.map(t=>`<span class="pill pill-blue" style="cursor:pointer" onclick="searchTagP('${t}')">#${t}</span>`).join('');
}
function searchTagP(t){_q=t;_page=1;document.querySelector('.board-search').value=t;renderPosts()}

/* ── Open post ── */
function openPost(id){
  const p=DB.posts().find(x=>x.id===id);if(!p)return;
  document.getElementById('pmTitle').textContent=p.title;
  const filesHtml=p.files&&p.files.length?`<div class="pd-files"><h4>📎 첨부파일 (${p.files.length}개)</h4>${p.files.map(f=>`<a class="pd-file" href="${f.data}" download="${esc(f.name)}">📎 ${esc(f.name)} (${fmtSize(f.size)})</a>`).join('')}</div>`:'';
  document.getElementById('pmBody').innerHTML=`
    <div class="pd-meta"><span>${esc(p.cat)}</span><span>${esc(p.author)}</span><span>${esc(p.dept||'')}</span><span>${fmtDate(p.createdAt)}</span></div>
    <div class="pd-body">${esc(p.body)}</div>${filesHtml}`;
  openModal('postModal');
}

function afterLogin(){renderWrite();renderPosts()}
function afterLogout(){renderWrite();renderPosts()}

/* ── init ── */
renderWrite();renderPosts();renderStats();
</script>
</body>
</html>
